# iVAE: train on one domain, test on other domains (NO drift)
# This should behave like the fixed-mixing setting, so train/test MCC should be similar.

# dataset (source nonstationarity)
nps: 500
ns: 20
dl: 5
dd: 5
nl: 3
s: 1
p: 'gauss'
act: 'xtanh'
uncentered: false
noisy: false
staircase: false

# ---- drift knobs ----
mix_drift: true
n_domains: 3
drift_mode: 'perturb'
drift_strength: 0.0
share_source_params: true

# ---- train/test split across domains ----
train_domains: [0]
# if test_domains is omitted, runner will use all remaining domains as test
# test_domains: [1, 2]

# model args
n_layers: 3
hidden_dim: 100
activation: 'xtanh'
ica: true
initialize: true
batch_norm: false
tcl: false

# learning
a: 100
b: 1
c: 0
d: 10
gamma: 0
lr: 0.01
batch_size: 64
epochs: 20
no_scheduler: false
scheduler_tol: 3
anneal: false
anneal_epoch: 20

# dataloader
num_workers: 0
